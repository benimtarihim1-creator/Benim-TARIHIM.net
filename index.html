* { margin: 0; padding: 0; box-sizing: border-box; }

body {

  line-height: 1.6;

header { 
  background: linear-gradient(90deg, #102b55 0%, #1f356b 100%);
  padding: 2rem 1rem;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  border-bottom: 3px solid #ffd700;
}

header h1 { 
  margin: 0; 
  color: #ffd700;
  font-size: 2.5rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

header p {
  color: #e0d5b7;
  margin-top: 0.5rem;
  font-style: italic;
}

nav { 
  display: flex; 
  flex-wrap: wrap; 
  justify-content: center; 
  margin-top: 1.5rem;
  gap: 0.5rem;
}

nav a { 
  padding: 0.7rem 1.2rem;
  text-decoration: none; 
  color: #f5f0e1;
  font-weight: bold;
  background: rgba(255, 215, 0, 0.1);
  border: 2px solid #ffd700;
  border-radius: 20px;
  transition: all 0.3s ease;
}

nav a:hover { 
  background: #ffd700;
  color: #0b1d3f;
  transform: scale(1.1);
}

.timeline-container {
  max-width: 1200px;
  margin: 3rem auto;
  padding: 0 1rem;
}

.timeline {
  position: relative;
  padding: 2rem 0;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, #ffd700, #ff8c00, #d32f2f);
}

.timeline-item {
  margin-bottom: 3rem;
  position: relative;
}

.timeline-item:nth-child(odd) {
  padding-left: calc(50% + 2rem);
}

.timeline-item:nth-child(even) {
  padding-right: calc(50% + 2rem);
}

.timeline-marker {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 20px;
  background: #ffd700;
  border: 4px solid #0b1d3f;
  border-radius: 50%;
  top: 0;
  z-index: 10;
  box-shadow: 0 0 0 10px rgba(255, 215, 0, 0.2);
}
